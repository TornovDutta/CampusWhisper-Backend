version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: whisper-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: whisper
      POSTGRES_USER: whisper_user
      POSTGRES_PASSWORD: whisper_password
    volumes:
      - whisper-pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - whisper-network

  cache:
    image: redis:7-alpine
    container_name: whisper-redis
    ports:
      - "6379:6379"
    volumes:
      - whisper-redis-data:/data
    restart: unless-stopped
    networks:
      - whisper-network

  app:
    build: .
    container_name: campus-whisper
    ports:
      - "8443:8443"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/whisper
      SPRING_DATASOURCE_USERNAME: whisper_user
      SPRING_DATASOURCE_PASSWORD: whisper_password

      SPRING_REDIS_HOST: cache
      SPRING_REDIS_PORT: 6379

      SERVER_PORT: 8443
    depends_on:
      - database
      - cache
    restart: unless-stopped
    networks:
      - whisper-network

volumes:
  whisper-pg-data:
  whisper-redis-data:

networks:
  whisper-network:
    driver: bridge