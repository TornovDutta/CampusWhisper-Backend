
server:
  port: 8443
  ssl:
    key-store: classpath:keystore.p12
    key-store-password: whisper
    key-store-type: PKCS12
    key-alias: whisper

spring:
  application:
    name: whisper
  datasource:
    url: jdbc:postgresql://database:5432/whisper
    username: whisper_user
    password: whisper_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: cache
      port: 6379

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expirationMs: 86400000 # 24 hours
